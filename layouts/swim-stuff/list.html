{{ define "main" }}
<div class="post-list">
  {{ range .Pages.ByDate.Reverse }}
  <article class="swim-entry">
    <a href="{{ .RelPermalink }}">
      {{ if .Params.cover.image }}
      <img src="{{ .Params.cover.image }}" alt="{{ .Title }}">
      {{ end }}
      <div class="swim-entry-text">
        <h3>{{ .Title }}</h3>
        {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
        <span>{{ .Date.Format "2 January 2006" }}</span>
      </div>
    </a>
  </article>
  {{ end }}
</div>

<style>
.post-list { max-width: 800px; margin: 0 auto; }
.swim-entry { margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 18px; }
.swim-entry a { display: flex; align-items: center; gap: 16px; text-decoration: none; color: inherit; }
.swim-entry img { width: 110px; height: 75px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.swim-entry-text h3 { margin: 0 0 4px 0; font-size: 1.05rem; }
.swim-entry-text p { margin: 0 0 4px 0; font-size: 0.88rem; opacity: 0.75; }
.swim-entry-text span { font-size: 0.8rem; opacity: 0.55; }
</style>
{{ end }}
